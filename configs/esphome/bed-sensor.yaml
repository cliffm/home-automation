# bed-sensor.yaml

esphome:
  name: bed-sensor
  friendly_name: Bed Sensor

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Bed-Sensor Fallback"
    password: !secret fallback_password

captive_portal:

# FSR Analog Sensor
sensor:
  - platform: adc
    pin: GPIO0
    name: "Bed Pressure Raw"
    id: bed_pressure
    update_interval: 500ms
    attenuation: 12db
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 2
      # Convert voltage to 0-100% scale
      - calibrate_linear:
          - 1.1 -> 0 # ~1.1V = baseline (no pressure)
          - 3.2 -> 100 # ~3.2V = max pressure
      - clamp:
          min_value: 0
          max_value: 100
    unit_of_measurement: "%"
    accuracy_decimals: 0

  # WiFi signal strength
  - platform: wifi_signal
    name: "Bed Sensor WiFi"
    update_interval: 60s

# Binary sensor for bed occupancy
binary_sensor:
  - platform: template
    name: "Bed Occupancy"
    id: bed_occupied
    device_class: occupancy
    lambda: |-
      return id(bed_pressure).state > 30;
    filters:
      - delayed_on: 2s
      - delayed_off: 5s

  # Status sensor
  - platform: status
    name: "Bed Sensor Status"

# Restart button in HA
button:
  - platform: restart
    name: "Bed Sensor Restart"

esphome:
  name: stagg-ble-proxy
  friendly_name: Stagg BLE Proxy

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.30.22
  power_save_mode: none

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# --- Bluetooth Proxy bits ---
esp32_ble_tracker:

bluetooth_proxy:
  active: true
  cache_services: true

sensor:
  - platform: wifi_signal
    name: "Stagg Proxy WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Stagg Proxy IP"

button:
  - platform: restart
    name: "Stagg Proxy Restart"

esphome:
  name: kitchen-sink-presence
  friendly_name: Kitchen Sink Presence

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Kitchen-Presence-AP"
    password: !secret fallback_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

sensor:
  - platform: adc
    pin: GPIO0
    name: "Distance Voltage"
    id: distance_voltage
    update_interval: 200ms
    attenuation: 12db
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "Distance"
    id: distance_cm
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    update_interval: 200ms
    lambda: |-
      float voltage = id(distance_voltage).state;
      if (voltage < 0.3) return 80.0;
      float distance = 27.86 / (voltage - 0.1);
      if (distance > 80) return 80.0;
      if (distance < 10) return 10.0;
      return distance;

binary_sensor:
  - platform: template
    name: "Presence Detected"
    device_class: occupancy
    lambda: |-
      return id(distance_cm).state < 50.0;
    filters:
      - delayed_on: 200ms
      - delayed_off: 2s

# =============================================================================
# HOME ASSISTANT CONFIGURATION
# Enterprise Home Automation Infrastructure
# Last Updated: September 2025
# =============================================================================

# =============================================================================
# CORE INTEGRATIONS
# =============================================================================

default_config:

tts:
  - platform: google_translate

wake_on_lan:

notify:

# =============================================================================
# HTTP CONFIGURATION
# =============================================================================

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.18.0.0/16
    - 172.20.0.0/16
    - 172.16.0.0/12
    - 192.168.1.85
    - 127.0.0.1
    - ::1

# =============================================================================
# DATABASE
# =============================================================================

recorder:
  db_url: !secret postgres_db_url
  db_max_retries: 3
  db_retry_wait: 5
  purge_keep_days: 30
  auto_purge: true
  include:
    domains:
      - sensor
      - binary_sensor
      - switch
      - light
      - climate
      - cover
      - lock
      - device_tracker
      - person
      - zone
      - automation
      - script
      - scene
      - input_boolean
  exclude:
    domains:
      - updater
      - sun
    entities:
      - sensor.time
      - sensor.date
      - sensor.uptime

# =============================================================================
# INPUT HELPERS
# =============================================================================

input_boolean:
  vacation_mode:
    name: Vacation Mode
    icon: mdi:wallet-travel

  guest_mode:
    name: Guests Visiting
    icon: mdi:account-circle

  cameron_mode:
    name: Cameron Visiting
    icon: mdi:account-circle

  front_door_autolock:
    name: Front Door Auto-Lock
    icon: mdi:lock-clock

  front_door_snapshot:
    name: Front Door Snapshot
    icon: mdi:camera-account

  coffee_made:
    name: Coffee Kettle Started Today
    icon: mdi:coffee

# =============================================================================
# MQTT (NEW STYLE)
# =============================================================================

mqtt:
  sensor:
    # -----------------------------------------------------------------------
    # Dog Care Sensors – Timestamp (Primary Data)
    # -----------------------------------------------------------------------
    - name: "Dog Fed Morning"
      state_topic: "dog/fed/morning"
      device_class: timestamp
      value_template: >
        {% if value not in ['', None] %}
          {{ value }}
        {% else %}
          {{ None }}
        {% endif %}
      icon: mdi:dog
    - name: "Dog Fed Evening"
      state_topic: "dog/fed/evening"
      device_class: timestamp
      value_template: >
        {% if value not in ['', None] %}
          {{ value }}
        {% else %}
          {{ None }}
        {% endif %}
      icon: mdi:dog

    # -----------------------------------------------------------------------
    # RTL_433 Sensors
    # -----------------------------------------------------------------------
    - name: "Freezer Temperature"
      icon: mdi:snowflake-thermometer
      state_topic: "rtl_433/tartlet"
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      value_template: >-
        {% set data = value_json %}
        {% if data.model == "Acurite-986" and data.channel == "2F" %}
          {{ "%.1f" | format(data.temperature_C | float * 9/5 + 32) }}
        {% endif %}
      json_attributes_topic: "rtl_433/tartlet"
      json_attributes_template: >-
        {% set data = value_json %}
        {% if data.model == "Acurite-986" and data.channel == "2F" %}
          {{
            {
              "battery_ok": data.battery_ok,
              "channel": data.channel,
              "last_seen": data.time,
              "device_model": data.model,
              "device_id": data.id
            } | tojson
          }}
        {% else %}
          {}
        {% endif %}

    - name: "Refrigerator Temperature"
      icon: mdi:fridge-outline
      state_topic: "rtl_433/tartlet"
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      value_template: >-
        {% set data = value_json %}
        {% if data.model == "Acurite-986" and data.channel == "1R" %}
          {{ "%.1f" | format(data.temperature_C | float * 9/5 + 32) }}
        {% endif %}
      json_attributes_topic: "rtl_433/tartlet"
      json_attributes_template: >-
        {% set data = value_json %}
        {% if data.model == "Acurite-986" and data.channel == "1R" %}
          {{
            {
              "battery_ok": data.battery_ok,
              "channel": data.channel,
              "last_seen": data.time,
              "device_model": data.model,
              "device_id": data.id
            } | tojson
          }}
        {% else %}
          {}
        {% endif %}

  binary_sensor:
    - name: "Dog Fed Morning"
      state_topic: "dog/fed/morning"
      value_template: >
        {% if value not in ['', None] %}
          ON
        {% else %}
          OFF
        {% endif %}

    - name: "Dog Fed Evening"
      state_topic: "dog/fed/evening"
      value_template: >
        {% if value not in ['', None] %}
          ON
        {% else %}
          OFF
        {% endif %}

# =============================================================================
# NON-MQTT SENSORS
# =============================================================================

sensor:
  - platform: statistics
    name: "Average Bathroom Humidity"
    entity_id: sensor.bathroom_sensor_humidity
    state_characteristic: mean
    sampling_size: 3600
    max_age:
      hours: 24

# =============================================================================
# EXTERNAL FILES
# =============================================================================

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
